name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: phpick-windows-x86_64.exe
            ext: .exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset: phpick-windows-arm64.exe
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: phpick-linux-x86_64
            ext: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: phpick-linux-arm64
            ext: ''
          - os: macos-13
            target: x86_64-apple-darwin
            asset: phpick-macos-x86_64
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: phpick-macos-arm64
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: rename artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/phpick${{ matrix.ext }}"
          cp "$src" "${{ matrix.asset }}"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: compute checksums
        working-directory: dist
        run: sha256sum phpick-* > SHA256SUMS

      - name: resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/phpick-*
            dist/SHA256SUMS
          generate_release_notes: true
